<!doctype html>
<html xmlns:th="http://www.thymeleaf.org"
      th:fragment="layout(content)">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <title th:text="${title}">Default Title</title>
    <link rel="stylesheet" th:href="@{/css/style.css}" />
</head>

<body>
    
	 <nav class="navbar navbar-expand-lg navbar-light bg-light fw-bold">
		  <div class="container-fluid">
		    <a class="navbar-brand" href="#">Smart Contact Manager</a>
		    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
		      <span class="navbar-toggler-icon"></span>
		    </button>
		    <div class="collapse navbar-collapse" id="navbarNav">
		      <ul class="navbar-nav ms-auto gap-3">
		        <li class="nav-item">
		          <a class="nav-link " aria-current="page"   href="#" th:href="@{/}">Home</a>
		        </li>
		        <li class="nav-item">
		          <a class="nav-link" href="#"   th:href="@{/about}">About</a>
		        </li>
		        <li class="nav-item">
		          <a class="nav-link" href="#"  th:href="@{/signin}">Login</a>
		        </li>
		        <li class="nav-item">
		          <a class="nav-link active" aria-current="page" href="#"  th:href="@{/signup}">Signup</a>
		        </li>
		      </ul>
		    </div>
		  </div>
	</nav>

    <!-- Dynamic Content -->
    <div class="container-fluid p-0">
        <div th:replace="${content}"></div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>
        
    <script th:src="@{/js/script.js}"></script>

</body>
</html>
