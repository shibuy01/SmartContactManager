<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
<meta charset="UTF-8">
<title>Contact</title>
</head>

<body th:replace="~{normal/base::layout(~{::section})}">

	<section>
		<div th:if="${message}" class="alert"
			th:classappend="'alert-' + ${message.type}">
			<span th:text="${message.content}"></span>
		</div>
		<div class="card mr-3 ml-3">
			<div class="card-body">

				<h2 class="text-center">Your Contacts</h2>

				<div class="table-responsive">
					<table class="table">
						<thead>
							<tr>
								<th scope="col">#ID</th>
								<th scope="col">Name</th>
								<th scope="col">Email</th>
								<th scope="col">Phone</th>
								<th scope="col">Action</th>
							</tr>
						</thead>
						<tbody>
							<tr th:each="c : ${contacts}">
								<th scope="row" th:text="${c.cId}">1</th>
								<td><img class="profile_image"
									th:src="@{/image/{img}(img=${c.image})}" alt="profile"> <span
									th:text="${c.name}"></span></td>
								<td><a th:href="@{'/user/contact/' + ${c.cId}}"> <span
										th:text="${c.email}"></span>
								</a></td>
								<td th:text="${c.phone}"></td>
								<td><a href="javascript:void(0)"
									th:onclick="'deleteContact(' + ${c.cId} + ')'"
									class="btn btn-danger btn-sm"> Delete </a>
									<form method="post"
										th:action="@{'/user/update-contact/' + ${c.cId}}" class="mt-2">
										<button type="submit" class="btn btn-primary btn-sm">Update</button>
									</form></td>
							</tr>
						</tbody>
					</table>
				</div>
				<nav aria-label="Page navigation example">
					<ul class="pagination">

						<!-- Previous Button -->
						<li th:if="${currentPage != 0}" class="page-item"><a
							th:href="@{'/user/show-contact/' + ${currentPage-1}}"
							class="page-link">Previous</a></li>

						<!-- Page Numbers -->
						<li th:each="i : ${#numbers.sequence(0, totalPage-1)}"
							th:classappend="${currentPage == i} ? 'active' : ''"
							class="page-item"><a
							th:href="@{'/user/show-contact/' + ${i}}" class="page-link">
								<span th:text="${i+1}"></span>
						</a></li>

						<!-- Next Button -->
						<li th:if="${currentPage+1 < totalPage}" class="page-item"><a
							th:href="@{'/user/show-contact/' + ${currentPage+1}}"
							class="page-link">Next</a></li>

					</ul>
				</nav>
			</div>
		</div>

		<script>
			$(document).ready(() => {
				$(".item").removeClass("active");
				$("#view-link").addClass("active");
			});
		</script>

	</section>

</body>

</html>
