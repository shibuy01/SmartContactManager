<!doctype html>
<html xmlns:th="http://www.thymeleaf.org" th:fragment="layout(content)">

<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<!-- Bootstrap CSS -->
<link
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css"
	rel="stylesheet">
<link rel="stylesheet"
	href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
	integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
	crossorigin="anonymous" referrerpolicy="no-referrer" />

<title th:text="${title}">Default Title</title>
<link rel="stylesheet" th:href="@{/css/style.css}" />
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</head>

<body>

	<nav class="navbar navbar-expand-lg navbar-light bg-light fw-bold ">
		<div class="container-fluid">
			<a class="navbar-brand " href="#">Smart Contact Manager</a>
			<button class="navbar-toggler" type="button"
				data-bs-toggle="collapse" data-bs-target="#navbarNav"
				aria-controls="navbarNav" aria-expanded="false"
				aria-label="Toggle navigation">
				<span class="navbar-toggler-icon"></span>
			</button>
			<div class="collapse navbar-collapse" id="navbarNav">
				<ul class="navbar-nav ms-auto gap-3">
					<li class="nav-item"><a class="nav-link " aria-current="page"
						href="#" th:href="@{/}">Home</a></li>

					<li class="nav-item"><a class="nav-link"><span
							th:text="${user.name}"></span></a></li>

					<li class="nav-item">
						<form th:action="@{/logout}" method="post">
							<button class="sidebar-btn fw-bold active" aria-current="page">
								<i class="fa-solid fa-arrow-right-from-bracket "></i> Logout
							</button>
						</form>
					</li>
				</ul>
			</div>
		</div>
	</nav>


	<!--Sidebar  -->

	<div class="sidebar ">

		<span onclick="toggleSidebar()" class="crossbtn">&times;</span> <a
			id="home-link" href="#" th:href="@{/user/index}" class="item active">
			<i class="fa-solid fa-house"></i> Home
		</a> <a id="view-link" href="#" th:href="@{/user/show-contact/0}"
			class="item"> <i class="fa-regular fa-eye"></i> View Contact
		</a> <a id="add-link" href="#" th:href="@{/user/add-contact}" class="item">
			<i class="fa-solid fa-person-circle-plus"></i> Add Contact
		</a> <a id="profile-link" href="#" th:href="@{/user/profile}" class="item"><i
			class="fa-solid fa-circle-user"></i> Your Profile</a> <a
			id="setting-link" href="#" th:href="@{/user/settings}" class="item">
			<i class="fa-solid fa-wrench"></i> Settings
		</a>

		<form th:action="@{/logout}" method="post">
			<button class="sidebar-btn">
				<i class="fa-solid fa-arrow-right-from-bracket"></i> Logout
			</button>
		</form>
		<div class="divider"></div>

	</div>


	<!-- Dynamic Content -->
	<div class="content">

		<div class="barh">
			<i onclick="toggleSidebar()" class=" fas fa-bars m-3 "></i>
		</div>



		<!-- Message box -->
		<div th:if="${session.message}" class="container">

			<div th:classappend="'alert-' + ${session.message.type}"
				class="alert text-center">
				<span th:text="${session.message.content}"></span>
			</div>

			<!-- remove message from session -->
			<th:block th:with="dummy=${#session.removeAttribute('message')}"></th:block>

		</div>



		<div th:replace="${content}"></div>
	</div>

	<!-- Bootstrap JS -->

	<script
		src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>
	<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

	<script>
		function deleteContact(cId) {

			Swal.fire({
				title: "Are you sure?",
				text: "You want to delete this contact!",
				icon: "warning",
				showCancelButton: true,
				confirmButtonColor: "#3085d6",
				cancelButtonColor: "#d33",
				confirmButtonText: "Yes, delete it!"
			}).then((result) => {

				if (result.isConfirmed) {
					window.location.href = "/user/delete/" + cId;
				} else {
					Swal.fire("Cancelled", "Your contact is safe :)", "info");
				}

			});
		}
	</script>

	<script th:src="@{/js/script.js}"></script>

</body>

</html>
