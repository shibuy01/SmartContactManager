<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Contacts Details</title>
</head>

<body th:replace="~{normal/base::layout(~{::section})}">

<section>
    
    <div class="card mr-3 ml-3">
    	<div class="card-body">
    		
    		<div class="container text-center">
    		
    			<img style="height:200px; width:200px;" class="profile_image" th:src="@{'/image/' + ${contact.image}}" alt="profile">
				<h2 class="mt-3">
				    <span th:text="${contact.name}"></span>
				    (<span th:text="${contact.secondName}"></span>)
				</h2>    			
    			<table class="table">
				  <thead>
				    <tr>
				      <th scope="col">#Id</th>
				      <th scope="col" th:text="${contact.cId}"></th>
				    </tr>
				  </thead>
				  <tbody>
				    <tr>
				      <th scope="row">Email</th>
				      <td th:text="${contact.email}"> </td>
				    </tr>
				    <tr>
				      <th scope="row">Phone</th>
				      <td th:text="${contact.phone}"></td>
				    </tr>
				    <tr>
				      <th scope="row">Work</th>
				      <td th:text="${contact.work}"></td>
				    </tr>
				  </tbody>
				</table>
    			
    			<div class="description">
    				
    				<th:block th:text="${contact.description}"></th:block>
    				
    			</div>
    			<div class="container mt-3">
    				<button th:onclick="|deleteContact(${contact.cId})|" class="btn btn-danger btn-sm w-100">Delete</button>
				    <form method="post" th:action="@{'/user/update-contact/' + ${contact.cId}}" class="mt-2">
						    <button type="submit" class="btn btn-primary btn-sm w-100">Update</button>
					</form>
    			</div>
    		</div>
    		
    	</div>
    </div>
    
</section>

</body>
</html>
