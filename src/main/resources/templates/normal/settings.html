<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Settings</title>
</head>

<body th:replace="~{normal/base::layout(~{::section})}">

<section>
    <div class="container">
    	<div class="row">
    		<div class="col-md-12">
    			<div class="card">
    				<div class="card-body">
    					<h3>Change Password</h3>
    					
    				<form th:action="@{/user/change-password}" method="post">

						    <!-- CSRF TOKEN (VERY IMPORTANT) -->
						    <input type="hidden" th:name="${_csrf.parameterName}" 
						           th:value="${_csrf.token}" />
						
						    <!-- old Password field -->
						    <div class="form-group">
						        <input type="password" name="oldPassword" class="form-control" placeholder="Enter old Password..."/>
						    </div>
						
						    <div class="form-group mt-3">
						        <input type="password" name="newPassword" class="form-control" placeholder="Enter New Password..."/>
						    </div>
						
						    <div class="text-center mt-3">
						        <button type="submit" class="btn btn-success">Change</button>
						        <button type="reset" class="btn btn-primary">Reset</button>
						    </div>
						
						</form>
    				</div>
    			</div>
    		</div>
    	</div>
    </div>
    
    
    <script> 
	   $(document).ready(()=>{
	    	$(".item").removeClass("active");
	    	$("#setting-link").addClass("active");
	   });
   </script>
</section>

</body>
</html>
