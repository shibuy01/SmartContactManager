<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Forgot Password</title>
</head>

<body th:replace="~{base::layout(~{::section})}">

<section>
    <div class="container d-flex justify-content-center align-items-center" style="height: 100vh;">

        <div class="col-md-5">
            <div class="p-4 shadow" style="background-color: #e3f2fd; border-radius: 12px;">
            
                <!--  Message box -->
                <div th:if="${message}" class="container">
				
				    <div th:classappend="'alert-' + ${message.type}" 
				         class="alert text-center">
				        <span th:text="${message.content}"></span>
				    </div>
				
				</div>

                <h4 class="text-center mb-4 fw-bold">Your Registered Email</h4>
                
                <form method="post" th:action="@{/send-otp}">
                
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                    
                    <div class="mb-3">
                        <input 
                            type="email" 
                            name="email" 
                            placeholder="Enter email here..." 
                            class="form-control"
                            required>
                    </div>

                    <div class="text-center">
                        <button type="submit" class="btn btn-warning w-100">
                            Send OTP
                        </button>
                    </div>

                </form>

            </div>
        </div>

    </div>
</section>

</body>
</html>
