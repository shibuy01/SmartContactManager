# -------------------------------
# Enable debug
# -------------------------------
debug=true

# -------------------------------
# Application Info
# -------------------------------
spring.application.name=SmartContactManager

# -------------------------------
# Server Configuration
# -------------------------------
server.port=${PORT:8080}  # Railway override, default 8080

# -------------------------------
# Database Configuration
# -------------------------------
spring.datasource.url=${MYSQL_URL:jdbc:mysql://localhost:3306/SmartContactManager}
spring.datasource.username=${MYSQLUSER:root}
spring.datasource.password=${MYSQLPASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Hibernate / JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# -------------------------------
# File Upload Limits
# -------------------------------
spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=100MB

# -------------------------------
# Mail Configuration
# -------------------------------
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.debug=true